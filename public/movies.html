<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movie Night — Jeremiah Daws's Film Collection</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<meta name="description" content="Jeremiah Daws's personal movie collection — 967 films, indexed and randomized." />
<meta name="theme-color" content="#00308f">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    overflow-x: hidden;
    max-width: 100%;
  }
  /* When modal is open we lock the document scroll */
  body.modal-open {
    overflow: hidden;
    position: fixed;
    width: 100%;
  }
  body {
    /* Deeper midnight blue — less storefront, more archive. Gold reserved for accents only. */
    background: #0a1530;
    background-image:
      url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E"),
      radial-gradient(ellipse 80% 60% at 50% 0%, #1a2b5c 0%, #0a1530 40%, #050a1d 100%);
    color: #e8e3d5;
    font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 2.5rem 1.25rem;
    animation: vhsTracking 0.8s ease-out;
  }
  @keyframes vhsTracking {
    0% { transform: translateX(-3px); opacity: 0.7; filter: blur(0.5px); }
    8% { transform: translateX(2px); opacity: 1; filter: none; }
    100% { transform: translateX(0); opacity: 1; }
  }
  /* Slow-drifting CRT scan lines overlaid above everything */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 300;
    background-image: repeating-linear-gradient(
      0deg,
      rgba(0,0,0,0.06) 0,
      rgba(0,0,0,0.06) 1px,
      transparent 1px,
      transparent 3px
    );
    mix-blend-mode: multiply;
    animation: scanDrift 8s linear infinite;
    opacity: 0.5;
  }
  @keyframes scanDrift {
    from { background-position: 0 0; }
    to { background-position: 0 12px; }
  }
  /* Header — a curated archive masthead, not a storefront sign */
  .masthead {
    text-align: center;
    margin-bottom: 2.2rem;
    padding-top: 0.5rem;
  }
  .masthead-kicker {
    font-size: 0.72rem;
    letter-spacing: 0.18em;
    color: #f5c518;
    font-weight: 400;
    text-transform: uppercase;
    margin-bottom: 1rem;
    opacity: 0.75;
    font-style: italic;
    font-family: 'Didot', 'Bodoni 72', Georgia, serif;
  }
  .masthead-rule {
    width: min(420px, 80%);
    height: 1px;
    margin: 0 auto;
    background: linear-gradient(90deg, transparent, rgba(245,197,24,0.55), transparent);
  }
  h1 {
    font-size: 3.2rem;
    letter-spacing: 0.02em;
    text-transform: none;
    color: #ffd700;
    margin: 1rem 0;
    font-weight: 400;
    font-style: italic;
    font-family: 'Didot', 'Bodoni 72', 'Playfair Display', Georgia, serif;
    text-shadow: 0 2px 20px rgba(255,215,0,0.15);
  }
  .masthead-tagline {
    color: rgba(245,197,24,0.55);
    font-size: 0.6rem;
    letter-spacing: 0.4em;
    font-weight: 500;
    text-transform: uppercase;
    margin-top: 0.9rem;
  }
  /* Stats strip — three numbers below the masthead, like a magazine masthead */
  .stats-strip {
    display: flex;
    justify-content: center;
    gap: 2.5rem;
    margin-bottom: 2.2rem;
    padding: 1rem 0;
    border-top: 1px solid rgba(245,197,24,0.12);
    border-bottom: 1px solid rgba(245,197,24,0.12);
    width: min(560px, 88%);
    margin-left: auto;
    margin-right: auto;
  }
  .stat {
    text-align: center;
  }
  .stat-num {
    color: #ffd700;
    font-family: 'Didot', 'Bodoni 72', Georgia, serif;
    font-size: 1.5rem;
    font-style: italic;
    font-weight: 700;
    line-height: 1;
  }
  .stat-label {
    color: rgba(232,227,213,0.5);
    font-size: 0.55rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    margin-top: 0.35rem;
    font-weight: 600;
  }
  @media (max-width: 700px) {
    .stats-strip { gap: 1.5rem; padding: 0.8rem 0; margin-bottom: 1.6rem; }
    .stat-num { font-size: 1.25rem; }
    .stat-label { font-size: 0.5rem; letter-spacing: 0.18em; }
  }
  .decade-row {
    display: flex;
    gap: 0.3rem;
    margin-bottom: 1.2rem;
    flex-wrap: wrap;
    justify-content: center;
  }
  .decade-btn {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(232,227,213,0.15);
    color: rgba(232,227,213,0.7);
    padding: 0.45rem 0.95rem;
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.74rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    transition: all 0.15s;
  }
  .decade-btn:hover { border-color: rgba(245,197,24,0.4); color: #f5c518; }
  .decade-btn.active {
    background: rgba(245,197,24,0.12);
    border-color: rgba(245,197,24,0.55);
    color: #ffd700;
  }
  .filter-row {
    display: flex;
    gap: 0.6rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
  }
  .filter-input, .filter-select {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(245,197,24,0.2);
    color: #e8e3d5;
    padding: 0.6rem 0.9rem;
    border-radius: 4px;
    font-family: inherit;
    font-size: 0.85rem;
    font-weight: 500;
    letter-spacing: 0.01em;
    min-width: 220px;
    appearance: none;
    -webkit-appearance: none;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
  }
  .filter-input::placeholder { color: rgba(232,227,213,0.4); }
  .filter-input:focus, .filter-select:focus {
    outline: none;
    background: rgba(255,255,255,0.07);
    border-color: rgba(245,197,24,0.6);
  }
  .filter-select option {
    background: #0a1530;
    color: #e8e3d5;
  }
  .filter-clear {
    background: transparent;
    border: 1px solid rgba(232,227,213,0.2);
    color: rgba(232,227,213,0.6);
    padding: 0.6rem 0.9rem;
    border-radius: 4px;
    font-family: inherit;
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-clear:hover { border-color: rgba(245,197,24,0.4); color: #f5c518; }
  .genre-loading {
    font-size: 0.72rem;
    color: #f5c518;
    letter-spacing: 0.1em;
    font-weight: 600;
    text-transform: uppercase;
    opacity: 0.7;
    margin-bottom: 1rem;
  }
  .action-row {
    display: flex;
    gap: 0.8rem;
    margin-bottom: 1.5rem;
    align-items: center;
  }
  .pick-btn {
    background: linear-gradient(180deg, #ffd700 0%, #e6b800 100%);
    border: none;
    color: #0a1530;
    padding: 1rem 2.6rem;
    font-family: inherit;
    font-size: 0.92rem;
    font-weight: 700;
    font-style: normal;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    border-radius: 4px;
    box-shadow: 0 4px 16px rgba(255,215,0,0.25);
  }
  .pick-btn:hover {
    background: linear-gradient(180deg, #ffe04d 0%, #f5c518 100%);
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(255,215,0,0.35);
  }
  .pick-btn:active { transform: translateY(1px); box-shadow: 0 2px 8px rgba(255,215,0,0.2); }
  .shelf-btn {
    background: transparent;
    border: 1px solid rgba(245,197,24,0.3);
    color: rgba(245,197,24,0.85);
    padding: 1rem 1.4rem;
    font-family: inherit;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
    border-radius: 4px;
  }
  .shelf-btn:hover { background: rgba(245,197,24,0.06); border-color: rgba(245,197,24,0.5); color: #ffd700; }
  .shelf-btn.active { background: rgba(245,197,24,0.1); border-color: rgba(245,197,24,0.55); color: #ffd700; }
  .shelf {
    display: none;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 1.4rem;
    max-width: 1300px;
    width: 100%;
    margin: 0 auto 2.5rem;
    padding: 2rem 1.6rem;
    background:
      linear-gradient(180deg, rgba(20,28,52,0.6) 0%, rgba(10,15,30,0.4) 100%);
    border-top: 1px solid rgba(245,197,24,0.15);
    border-bottom: 1px solid rgba(245,197,24,0.15);
    border-radius: 8px;
    box-shadow: inset 0 0 30px rgba(0,0,0,0.4);
  }
  .shelf.open { display: grid; }
  /* VHS case styling — each shelf item is a clamshell with plastic bezel + label */
  .shelf-item {
    position: relative;
    aspect-ratio: 2 / 3.2;
    background: #0a0a0a;
    overflow: visible; /* Allow stickers and tilt highlight to escape */
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    border-radius: 1px;
    padding: 5px 4px 4px 9px;
    /* Plastic case look: outer bezel + inner depth */
    box-shadow:
      0 6px 14px rgba(0,0,0,0.8),
      inset 0 1px 0 rgba(255,255,255,0.15),
      inset 0 -2px 4px rgba(0,0,0,0.6),
      inset 2px 0 0 rgba(255,255,255,0.05),
      inset -1px 0 0 rgba(0,0,0,0.6);
    background:
      linear-gradient(90deg, var(--spine-color, #1a1a1a) 0%, #050505 12px, #0a0a0a 100%);
    transform-style: preserve-3d;
    will-change: transform;
  }
  /* The spine — narrow black strip on the left with title running vertically */
  .shelf-item::before {
    content: attr(data-title);
    position: absolute;
    top: 5px; bottom: 28px; left: 0;
    width: 9px;
    background: linear-gradient(90deg, #1f1f1f, #0a0a0a 70%);
    color: #f5c518;
    font-size: 6px;
    font-weight: 800;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    writing-mode: vertical-rl;
    text-orientation: mixed;
    padding: 0.3rem 0;
    text-align: center;
    overflow: hidden;
    white-space: nowrap;
    border-right: 1px solid rgba(255,255,255,0.08);
    text-shadow: 0 1px 1px rgba(0,0,0,0.9);
  }
  /* Highlight strip simulating the top edge of the plastic case */
  .shelf-item::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(180deg, rgba(255,255,255,0.2), transparent);
    pointer-events: none;
  }
  .shelf-item:hover {
    transform: translateY(-6px) scale(1.03);
    box-shadow:
      0 14px 28px rgba(0,0,0,0.9),
      0 0 18px rgba(245,197,24,0.5),
      inset 0 1px 0 rgba(255,255,255,0.18),
      inset 0 -2px 4px rgba(0,0,0,0.7);
    z-index: 2;
  }
  .shelf-item .cover {
    position: relative;
    width: 100%;
    height: calc(100% - 28px);
    overflow: hidden;
    background: #000;
    border: 1px solid #000;
    box-shadow: 0 1px 0 rgba(255,255,255,0.06) inset, 0 0 0 1px rgba(0,0,0,0.5);
  }
  .shelf-item .cover img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .shelf-item .fallback {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
    padding: 0.5rem;
    text-align: center;
    background: #00308f;
    color: #f5c518;
    font-size: 0.72rem;
    line-height: 1.3;
    font-weight: 700;
  }
  .shelf-item .fallback .t {
    color: #ffd700;
    font-size: 0.78rem;
    margin-bottom: 0.4rem;
    text-transform: uppercase;
    font-weight: 900;
    font-style: italic;
  }
  /* "STAFF PICK" — archival stamp style, not a toy sticker */
  .shelf-item .staff-pick {
    position: absolute;
    top: 9px;
    right: 9px;
    background: transparent;
    color: #ffd700;
    font-size: 0.5rem;
    font-weight: 800;
    padding: 3px 6px;
    border-radius: 2px;
    transform: rotate(-2deg);
    letter-spacing: 0.18em;
    line-height: 1;
    z-index: 2;
    pointer-events: none;
    text-transform: uppercase;
    border: 1px solid rgba(255,215,0,0.7);
    font-family: 'Inter', sans-serif;
  }
  /* "CULT CLASSIC" — same restraint */
  .shelf-item .cult-classic {
    position: absolute;
    bottom: 38px;
    left: 12px;
    background: transparent;
    color: #ff9e3d;
    font-size: 0.5rem;
    font-weight: 800;
    padding: 2px 5px;
    border-radius: 1px;
    transform: rotate(2deg);
    letter-spacing: 0.16em;
    line-height: 1;
    z-index: 2;
    pointer-events: none;
    text-transform: uppercase;
    border: 1px solid rgba(255,158,61,0.6);
    font-family: 'Inter', sans-serif;
  }
  /* Glossy highlight that follows the cursor — gives a 3D plastic feel on hover */
  .shelf-item .gloss {
    position: absolute;
    inset: 0;
    pointer-events: none;
    border-radius: 1px;
    background: radial-gradient(
      circle at var(--mx, 50%) var(--my, 50%),
      rgba(255,255,255,0.16) 0%,
      transparent 45%
    );
    opacity: 0;
    transition: opacity 0.2s;
    z-index: 3;
  }
  .shelf-item:hover .gloss { opacity: 1; }
  /* Bottom "label sticker" — like the white VHS title sticker stuck on the case */
  .shelf-item .label {
    position: absolute;
    bottom: 4px; left: 9px; right: 4px;
    height: 22px;
    background: #fff;
    color: #001f5e;
    font-size: 0.62rem;
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    padding: 3px 5px;
    overflow: hidden;
    text-overflow: ellipsis;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    box-shadow: 0 1px 0 rgba(0,0,0,0.4);
  }
  /* The Blockbuster price/rental sticker — small yellow corner tag */
  .shelf-item .rental-sticker {
    position: absolute;
    top: 8px;
    right: 7px;
    background: #ffd700;
    color: #00308f;
    font-size: 0.5rem;
    font-weight: 900;
    padding: 2px 5px;
    border-radius: 2px;
    transform: rotate(8deg);
    box-shadow: 0 1px 2px rgba(0,0,0,0.5);
    letter-spacing: 0.05em;
    z-index: 1;
    pointer-events: none;
  }
  .result {
    width: 100%;
    max-width: 720px;
    margin-bottom: 1.5rem;
  }
  /* When picked, becomes the BACK of a VHS case — black plastic shell + cream paper insert */
  .result:not(:empty) {
    --genre-color: #f5c518;
    background: linear-gradient(180deg, #1a1a1a 0%, #050505 100%);
    border-radius: 5px;
    padding: 10px 10px 10px 18px;
    box-shadow:
      0 14px 36px rgba(0,0,0,0.85),
      inset 0 1px 0 rgba(255,255,255,0.18),
      inset 0 -2px 4px rgba(0,0,0,0.7),
      inset 2px 0 0 rgba(255,255,255,0.06),
      inset -1px 0 0 rgba(0,0,0,0.6);
    position: relative;
  }
  /* Spine highlight strip on the left edge of the case */
  .result:not(:empty)::before {
    content: '';
    position: absolute;
    top: 10px; bottom: 10px; left: 0;
    width: 9px;
    background: linear-gradient(90deg, #1f1f1f, #0a0a0a 70%);
    border-right: 1px solid rgba(255,255,255,0.08);
    border-radius: 2px 0 0 2px;
  }
  /* Genre-colored stripe along the top of the paper insert */
  .vhs-back-paper {
    background: #f3f1ea;
    border-radius: 4px;
    padding: 18px 20px 12px;
    color: #1f1d19;
    position: relative;
    overflow: hidden;
    border-top: 6px solid var(--genre-color);
    box-shadow: inset 0 0 1px rgba(0,0,0,0.4);
    text-align: left;
  }
  .vhs-back-grid {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 130px;
    gap: 16px;
    align-items: start;
  }
  .vhs-back-main { display: flex; flex-direction: column; gap: 10px; min-width: 0; }
  .vhs-back-side { display: flex; flex-direction: column; gap: 8px; }
  .film-title {
    margin: 0;
    color: #1a1612;
    font-size: 1.6rem;
    line-height: 1.05;
    text-transform: uppercase;
    letter-spacing: -0.005em;
    font-weight: 900;
    font-style: italic;
  }
  .film-meta {
    margin: 0;
    color: rgba(71,65,57,0.78);
    font-size: 0.68rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    font-weight: 700;
  }
  .vhs-kicker {
    display: inline-block;
    font-size: 0.58rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(76,70,62,0.7);
    margin-bottom: 4px;
    font-weight: 800;
  }
  .vhs-synopsis {
    margin: 0;
    color: #2b2823;
    font-size: 0.82rem;
    line-height: 1.5;
    font-family: 'Georgia', serif;
  }
  .vhs-credits {
    display: flex;
    flex-direction: column;
    gap: 3px;
    margin-top: 4px;
    font-size: 0.68rem;
    line-height: 1.35;
    color: rgba(46,42,37,0.85);
  }
  .vhs-credits p { margin: 0; }
  .vhs-credits .label {
    color: rgba(90,84,76,0.75);
    font-weight: 800;
    font-size: 0.9em;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-right: 0.4em;
  }
  .vhs-rating-badge {
    display: inline-flex;
    align-items: center;
    align-self: flex-start;
    background: #21211d;
    color: #f0deb0;
    font-weight: 700;
    font-size: 0.7rem;
    padding: 3px 9px;
    border-radius: 999px;
    margin-top: 4px;
    letter-spacing: 0.04em;
  }
  .vhs-corner-art {
    width: 100%;
    aspect-ratio: 2/3;
    overflow: hidden;
    border: 1px solid rgba(59,40,19,0.3);
    background: #0a0a0a;
  }
  .vhs-corner-art img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .vhs-back-footer {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 12px;
    margin-top: 14px;
    padding-top: 8px;
    border-top: 1px solid rgba(84,79,72,0.18);
  }
  .vhs-barcode {
    display: flex;
    gap: 1px;
    height: 22px;
    opacity: 0.65;
  }
  .vhs-barcode span {
    background: rgba(20,18,15,0.85);
    display: block;
    height: 100%;
  }
  .vhs-copyright {
    font-size: 0.62rem;
    color: rgba(64,45,21,0.7);
    white-space: nowrap;
    font-family: 'Courier New', monospace;
    letter-spacing: 0.05em;
  }
  .film-status {
    font-size: 0.62rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 3px 7px;
    border-radius: 2px;
    font-weight: 800;
    display: inline-block;
    align-self: flex-start;
  }
  .status-unseen { color: #fff; background: #2e7d32; }
  .status-inprogress { color: #fff; background: #b80000; }
  .status-watched { color: #f3f1ea; background: #4a4035; }
  .actor-status {
    text-align: center;
    color: rgba(245,197,24,0.6);
    font-size: 0.66rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 0.8rem;
    font-style: italic;
    min-height: 1em;
  }
  /* "CHECKED OUT" stamp — shows on shelf items currently in the watchlist */
  .shelf-item .checked-out-stamp {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) rotate(-12deg);
    background: rgba(184,0,0,0.92);
    color: #ffd700;
    font-size: 0.7rem;
    font-weight: 900;
    padding: 5px 14px;
    border: 2px solid #ffd700;
    border-radius: 2px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    z-index: 5;
    pointer-events: none;
    box-shadow: 0 4px 14px rgba(0,0,0,0.6);
    font-family: 'Helvetica Neue', sans-serif;
  }
  /* Letterboxd-liked heart — small red corner overlay on shelf items the user "loved" */
  .shelf-item .liked-heart {
    position: absolute;
    top: 8px;
    left: 12px;
    color: #ff3030;
    font-size: 1rem;
    z-index: 3;
    pointer-events: none;
    text-shadow: 0 0 4px rgba(0,0,0,0.7), 0 0 8px rgba(255,48,48,0.5);
  }
  /* "More from this director" rail on the back of the case */
  .vhs-director-rail {
    margin-top: 14px;
    padding-top: 10px;
    border-top: 1px dashed rgba(84,79,72,0.25);
  }
  .vhs-director-rail-label {
    font-size: 0.58rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: rgba(76,70,62,0.7);
    font-weight: 800;
    margin-bottom: 8px;
  }
  .vhs-director-rail-scroll {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 4px;
  }
  .vhs-director-rail-item {
    flex: 0 0 70px;
    cursor: pointer;
    transition: transform 0.15s;
  }
  .vhs-director-rail-item:hover { transform: translateY(-2px); }
  .vhs-director-rail-item img {
    width: 100%;
    aspect-ratio: 2/3;
    object-fit: cover;
    border-radius: 2px;
    border: 1px solid rgba(46,42,37,0.4);
    display: block;
  }
  .vhs-director-rail-item .placeholder {
    width: 100%;
    aspect-ratio: 2/3;
    background: #2a2823;
    color: rgba(245,197,24,0.8);
    font-size: 0.6rem;
    padding: 0.4rem;
    text-align: center;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid rgba(46,42,37,0.4);
  }
  .vhs-director-rail-item .t {
    font-size: 0.56rem;
    color: rgba(46,42,37,0.85);
    text-align: center;
    margin-top: 3px;
    line-height: 1.1;
    text-transform: uppercase;
    font-weight: 700;
    letter-spacing: 0.02em;
  }
  /* Empty shelf state — playful message when filters return nothing */
  .shelf-empty {
    grid-column: 1 / -1;
    text-align: center;
    padding: 3rem 1rem;
    color: rgba(245,197,24,0.55);
  }
  .shelf-empty .big {
    font-family: 'Didot', Georgia, serif;
    font-size: 1.4rem;
    font-style: italic;
    color: #ffd700;
    margin-bottom: 0.5rem;
  }
  .shelf-empty .small {
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }
  /* Staff Picks rail — horizontally scrolling row of films Jeremiah rated 4.5+ on Letterboxd */
  .staff-picks {
    width: 100%;
    max-width: 1300px;
    margin: 0 auto 2rem;
    padding: 1.4rem 1.6rem 1.6rem;
    background:
      linear-gradient(180deg, rgba(20,28,52,0.6) 0%, rgba(10,15,30,0.4) 100%);
    border-top: 1px solid rgba(245,197,24,0.15);
    border-bottom: 1px solid rgba(245,197,24,0.15);
    border-radius: 8px;
    box-shadow: inset 0 0 30px rgba(0,0,0,0.4);
  }
  .staff-picks-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 1rem;
    padding: 0 0.2rem;
  }
  .staff-picks-title {
    color: #ffd700;
    font-size: 1rem;
    font-style: italic;
    font-weight: 700;
    font-family: 'Didot', 'Bodoni 72', Georgia, serif;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .staff-picks-subtitle {
    color: rgba(245,197,24,0.55);
    font-size: 0.62rem;
    letter-spacing: 0.25em;
    font-weight: 600;
    text-transform: uppercase;
  }
  .staff-picks-scroll {
    display: flex;
    gap: 1.2rem;
    overflow-x: auto;
    padding-bottom: 0.6rem;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,215,0,0.4) transparent;
  }
  .staff-picks-scroll::-webkit-scrollbar { height: 6px; }
  .staff-picks-scroll::-webkit-scrollbar-track { background: transparent; }
  .staff-picks-scroll::-webkit-scrollbar-thumb { background: rgba(255,215,0,0.4); border-radius: 3px; }
  .staff-picks-scroll .shelf-item { flex: 0 0 160px; }
  .staff-picks-toggle {
    background: none;
    border: 1px solid rgba(255,215,0,0.35);
    color: rgba(255,215,0,0.7);
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 0.62rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .staff-picks-toggle:hover { background: rgba(255,215,0,0.1); color: #ffd700; }
  .staff-picks.collapsed .staff-picks-scroll { display: none; }
  .staff-picks.collapsed { padding-bottom: 0.6rem; }
  /* Backdrop filmstrip — 2 stills like the "scenes from the film" strip on a real VHS back */
  .vhs-filmstrip {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
    margin-top: 16px;
    padding: 10px 0 6px;
    border-top: 1px dashed rgba(84,79,72,0.25);
  }
  .vhs-filmstrip-frame {
    aspect-ratio: 16/9;
    min-height: 140px;
    overflow: hidden;
    border: 1px solid rgba(46,42,37,0.4);
    background: #1a1a1a;
    position: relative;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05);
  }
  .vhs-filmstrip-frame img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    filter: sepia(0.18) saturate(0.85) contrast(0.95);
  }
  .vhs-filmstrip-frame::before,
  .vhs-filmstrip-frame::after {
    content: '';
    position: absolute;
    left: 0; right: 0;
    height: 3px;
    background-image: repeating-linear-gradient(90deg, #2b2823 0 4px, transparent 4px 8px);
    z-index: 1;
  }
  .vhs-filmstrip-frame::before { top: 0; }
  .vhs-filmstrip-frame::after { bottom: 0; }
  @media (max-width: 600px) {
    .vhs-back-grid { grid-template-columns: 1fr; }
    .vhs-back-side { flex-direction: row; gap: 12px; }
    .vhs-corner-art { width: 100px; }
  }

  /* MODAL — click a shelf item, the case lifts out and you can flip it over */
  .vhs-modal {
    position: fixed;
    inset: 0;
    z-index: 200;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    overflow: hidden; /* never let the modal itself spill */
  }
  .vhs-modal.open { display: flex; }
  .vhs-modal-backdrop {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.88);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
  }
  .vhs-case-shell {
    position: relative;
    width: min(430px, calc(100vw - 40px));
    /* dvh = "dynamic viewport height" — handles iOS Safari's collapsing URL bar */
    height: min(86dvh, 720px);
    max-height: 86dvh;
    perspective: 1800px;
    z-index: 1;
    animation: caseRise 0.35s ease-out;
  }
  @keyframes caseRise {
    from { opacity: 0; transform: translateY(20px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .vhs-case {
    position: relative;
    width: 100%;
    height: 100%;
    transform-style: preserve-3d;
    transition: transform 1040ms cubic-bezier(0.2, 0.8, 0.2, 1);
  }
  .vhs-case.flipped { transform: rotateY(180deg); }
  .vhs-case-face {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 18px;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    overflow: hidden;
    background: #0a0a0a;
    border-radius: 8px;
    border-left: 10px solid var(--genre-color, #ffd700);
    box-shadow:
      0 0 50px rgba(0,0,0,0.8),
      0 0 80px rgba(0,0,0,0.4),
      inset 0 1px 0 rgba(255,255,255,0.12);
  }
  .vhs-case-front {
    background:
      linear-gradient(180deg, rgba(17,18,35,0.96), rgba(8,8,16,0.98));
    color: #f2efe7;
  }
  .vhs-case-back { transform: rotateY(180deg); background: #0a0a0a; padding: 12px; }
  .vhs-case-back .vhs-back-paper { height: 100%; overflow-y: auto; }
  .vhs-case-front-badge {
    align-self: flex-start;
    padding: 4px 10px;
    border-radius: 999px;
    border: 1px solid rgba(255,215,0,0.3);
    background: rgba(255,215,0,0.08);
    color: rgba(255,241,191,0.86);
    font-size: 0.58rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    font-weight: 700;
  }
  .vhs-case-front-art {
    position: relative;
    flex: 1;
    min-height: 0;
    overflow: hidden;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.08);
    background: #101018;
  }
  .vhs-case-front-art img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
    display: block;
  }
  .vhs-case-front-art .placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #5a5a6a;
    font-size: 0.85rem;
    letter-spacing: 0.15em;
  }
  .vhs-case-front-copy {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .vhs-case-front-title {
    margin: 0;
    color: #f5f0e0;
    font-size: clamp(1.4rem, 4.2vw, 2.1rem);
    line-height: 1;
    text-transform: uppercase;
    letter-spacing: 0.02em;
    font-weight: 900;
    font-style: italic;
  }
  .vhs-case-front-meta {
    margin: 0;
    color: rgba(228,227,220,0.55);
    font-size: 0.67rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    font-weight: 700;
  }
  .vhs-case-actions {
    display: grid;
    grid-auto-flow: column;
    grid-auto-columns: minmax(0, 1fr);
    gap: 8px;
    margin-top: auto;
  }
  .vhs-case-back .vhs-case-actions { padding-top: 10px; }
  .vhs-turn-btn, .vhs-putback-btn {
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 0.7rem;
    font-weight: 800;
    padding: 9px 12px;
    border-radius: 3px;
    border: 1px solid rgba(255,215,0,0.35);
    background: rgba(255,215,0,0.08);
    color: #ffe69c;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    transition: background 0.15s;
  }
  .vhs-turn-btn:hover { background: rgba(255,215,0,0.18); }
  .vhs-putback-btn {
    border-color: rgba(255,255,255,0.18);
    background: rgba(255,255,255,0.04);
    color: rgba(228,227,220,0.7);
  }
  .vhs-putback-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }

  /* Floating back-to-top button — visible only after scrolling on mobile */
  .back-to-top {
    display: none;
    position: fixed;
    bottom: 18px;
    right: 16px;
    width: 48px;
    height: 48px;
    background: #ffd700;
    color: #00308f;
    border: 2px solid #00308f;
    border-radius: 50%;
    font-size: 1.4rem;
    font-weight: 900;
    line-height: 1;
    cursor: pointer;
    box-shadow: 0 6px 18px rgba(0,0,0,0.6);
    z-index: 150;
    transition: transform 0.15s, opacity 0.2s;
  }
  .back-to-top.visible { display: flex; align-items: center; justify-content: center; }
  .back-to-top:active { transform: scale(0.92); }

  /* ===== MOBILE ===== */
  @media (max-width: 700px) {
    body { padding: 1rem 0.6rem; overflow-x: hidden; }
    /* Stop any descendant from spilling past the viewport edge */
    body > * { max-width: 100%; }
    h1 {
      font-size: 1.85rem;
      /* Skewing + huge text-shadow extended past viewport on phones */
      transform: none;
      text-shadow: 2px 2px 0 #001f5e, 0 0 14px rgba(255,215,0,0.4);
    }
    .masthead { margin-bottom: 1.4rem; padding-top: 0.2rem; }
    .masthead-kicker { font-size: 0.62rem; letter-spacing: 0.14em; opacity: 0.95; }
    .masthead-rule { width: 86%; background: linear-gradient(90deg, transparent, rgba(245,197,24,0.7), transparent); }
    .masthead-tagline { font-size: 0.6rem; letter-spacing: 0.28em; color: rgba(245,197,24,0.8); }

    /* Filters stacked, search at top */
    .filter-row { flex-direction: column; align-items: stretch; gap: 0.5rem; margin-bottom: 0.8rem; }
    /* 16px minimum prevents iOS Safari auto-zoom when an input gets focus */
    .filter-input, .filter-select { min-width: 0; width: 100%; font-size: 16px; padding: 0.7rem 0.85rem; }
    .filter-clear { width: 100%; padding: 0.7rem; }

    /* Decade row — single horizontal scroll instead of cramped wrap */
    .decade-row {
      flex-wrap: nowrap;
      overflow-x: auto;
      justify-content: flex-start;
      gap: 0.4rem;
      padding-bottom: 0.5rem;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,215,0,0.3) transparent;
    }
    .decade-row::-webkit-scrollbar { height: 4px; }
    .decade-row::-webkit-scrollbar-thumb { background: rgba(255,215,0,0.3); border-radius: 2px; }
    .decade-btn {
      flex-shrink: 0;
      font-size: 0.78rem;
      padding: 0.55rem 1rem;
      min-height: 44px; /* WCAG-friendly touch target */
      scroll-snap-align: start;
    }

    .action-row { width: 100%; gap: 0.5rem; }
    .pick-btn { flex: 1; padding: 0.95rem 1.2rem; font-size: 0.9rem; letter-spacing: 0.1em; }
    .shelf-btn { padding: 0.95rem 1rem; font-size: 0.72rem; }

    /* TWO columns instead of three — bigger posters, readable labels */
    .shelf { grid-template-columns: repeat(2, 1fr); gap: 0.9rem; padding: 0.9rem; }
    /* Slightly taller label so two-line titles ("*batteries not included") don't clip */
    .shelf-item .label { font-size: 0.66rem; height: 32px; padding: 4px 6px; -webkit-line-clamp: 2; }
    /* Hide the vertical spine label on mobile — it overlapped poster art and the
       horizontal label below the cover already identifies the film */
    .shelf-item::before { display: none; }
    /* Reclaim the left padding the spine used */
    .shelf-item { padding-left: 4px; }

    .staff-picks { padding: 0.8rem; }
    .staff-picks-header { flex-wrap: wrap; gap: 0.4rem; }
    .staff-picks-title { font-size: 0.85rem; }
    .staff-picks-subtitle { display: none; }
    .staff-picks-scroll .shelf-item { flex: 0 0 130px; }

    /* Default Jeremiah's Picks to collapsed on mobile so the main grid is above the fold */
    .staff-picks.mobile-collapsed .staff-picks-scroll { display: none; }
    .staff-picks.mobile-collapsed { padding-bottom: 0.6rem; }

    .vhs-modal { padding: 10px; }
    .vhs-case-shell { width: calc(100vw - 20px); height: calc(100vh - 80px); max-height: 92vh; }
    .vhs-case-face { padding: 14px; gap: 8px; }
    .vhs-back-paper { padding: 14px 14px 10px; font-size: 0.92rem; }
    .vhs-back-paper .film-title { font-size: 1.3rem; }
    .vhs-case-front-title { font-size: 1.4rem; }
    .vhs-case-actions { grid-auto-flow: row; grid-auto-columns: auto; gap: 6px; }
    .vhs-turn-btn, .vhs-putback-btn { padding: 14px; font-size: 0.82rem; min-height: 44px; }
    .vhs-filmstrip { grid-template-columns: 1fr; gap: 4px; }
    .vhs-filmstrip-frame { min-height: 130px; }
    .vhs-synopsis { font-size: 0.82rem; line-height: 1.5; }
    .vhs-director-rail-item { flex: 0 0 68px; }

    /* Contrast bumps — the spine + small labels were too faint against the blue */
    .shelf-item::before { color: #ffd700; opacity: 0.95; }
    .pool-count { color: #ffd700; opacity: 1; }

    /* Disable mouse-tilt + gloss on touch */
    .shelf-item:hover { transform: none !important; }
    .shelf-item .gloss { display: none; }
  }
  .pool-count {
    margin-top: 0.5rem;
    margin-bottom: 1.5rem;
    font-size: 0.78rem;
    letter-spacing: 0.15em;
    color: #ffd700;
    text-transform: uppercase;
    font-weight: 700;
    opacity: 0.85;
  }
  .empty-msg {
    color: rgba(255,215,0,0.5);
    font-size: 0.85rem;
    letter-spacing: 0.15em;
    font-weight: 600;
    text-transform: uppercase;
  }
  .film-poster {
    width: 220px;
    border: 4px solid #fff;
    margin-bottom: 1.4rem;
    box-shadow: 0 14px 40px rgba(0,0,0,0.8);
    display: block;
    margin-left: auto;
    margin-right: auto;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  .poster-loading {
    width: 220px;
    height: 326px;
    background: #001f5e;
    border: 4px solid #fff;
    margin-bottom: 1.4rem;
    margin-left: auto;
    margin-right: auto;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #2a2820;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }
  .api-key-corner {
    position: fixed;
    bottom: 1rem;
    right: 1.2rem;
    font-family: Georgia, serif;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
  }
  .api-key-corner a {
    color: #2a2820;
    text-decoration: none;
    cursor: pointer;
    text-transform: uppercase;
  }
  .api-key-corner a:hover { color: #6a5a3a; }
  .api-key-panel {
    display: none;
    position: fixed;
    bottom: 2.4rem;
    right: 1.2rem;
    background: #0c0c10;
    border: 1px solid #2a2820;
    padding: 0.9rem;
    border-radius: 2px;
    min-width: 280px;
  }
  .api-key-panel label {
    display: block;
    font-size: 0.65rem;
    color: #5a5040;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 0.5rem;
    font-family: Georgia, serif;
  }
  .api-key-panel .panel-row {
    display: flex;
    gap: 0.4rem;
  }
  .api-key-panel input {
    flex: 1;
    background: none;
    border: 1px solid #2a2820;
    color: #c0a060;
    padding: 0.4rem 0.6rem;
    font-family: monospace;
    font-size: 0.75rem;
  }
  .api-key-panel input:focus { outline: none; border-color: #5a4a2a; }
  .api-key-panel button {
    background: none;
    border: 1px solid #c0a060;
    color: #c0a060;
    padding: 0.4rem 0.8rem;
    cursor: pointer;
    font-family: Georgia, serif;
    font-size: 0.7rem;
    letter-spacing: 0.08em;
  }
  .api-key-panel button:hover { background: rgba(192,160,96,0.08); }
  .api-key-panel .hint {
    margin-top: 0.5rem;
    font-size: 0.62rem;
    color: #3a3028;
    letter-spacing: 0.06em;
    font-family: Georgia, serif;
  }
</style>
</head>
<body>

<div class="masthead">
  <div class="masthead-kicker">The Personal Movie Collection of</div>
  <div class="masthead-rule"></div>
  <h1>Jeremiah Daws</h1>
  <div class="masthead-rule"></div>
  <div class="masthead-tagline" id="masthead-count">A Lifetime in Film</div>
</div>

<div class="stats-strip">
  <div class="stat"><div class="stat-num" id="stat-films">—</div><div class="stat-label">Films Owned</div></div>
  <div class="stat"><div class="stat-num" id="stat-directors">—</div><div class="stat-label">Directors</div></div>
  <div class="stat"><div class="stat-num" id="stat-recent">—</div><div class="stat-label">Recent Watches</div></div>
</div>

<div class="decade-row" id="decadeRow">
  <button class="decade-btn active" onclick="setDecade('all')">Any Decade</button>
</div>

<div class="filter-row">
  <input class="filter-input" id="searchInput" placeholder="Search titles…" oninput="setSearch(this.value)" />
  <input class="filter-input" id="directorInput" list="directorList" placeholder="Any director" oninput="setDirector(this.value)" />
  <datalist id="directorList"></datalist>
  <input class="filter-input" id="actorInput" placeholder="Any actor (Tom Hanks…)" oninput="setActor(this.value)" />
  <select class="filter-select" id="genreSelect" onchange="setGenre(this.value)">
    <option value="all">Any genre</option>
  </select>
  <select class="filter-select" id="sortSelect" onchange="setSort(this.value)">
    <option value="az">Sort: A–Z</option>
    <option value="random">Sort: Shuffle</option>
    <option value="year-desc">Sort: Newest First</option>
    <option value="year-asc">Sort: Oldest First</option>
    <option value="rating-desc">Sort: Best Rated</option>
    <option value="director">Sort: Director</option>
  </select>
  <button class="filter-clear" onclick="clearFilters()">Clear</button>
</div>
<div class="actor-status" id="actorStatus"></div>

<div class="action-row">
  <button class="pick-btn" onclick="pick()">Pick One</button>
  <button class="shelf-btn active" id="shelfBtn" onclick="toggleShelf()">Hide Shelf</button>
</div>

<div class="genre-loading" id="genreLoading"></div>

<div class="result" id="result"></div>

<div class="pool-count" id="poolCount"></div>

<div class="staff-picks" id="watchlistRail" style="display:none">
  <div class="staff-picks-header">
    <span class="staff-picks-title">Checked Out</span>
    <span class="staff-picks-subtitle">Your To-Watch Rentals</span>
  </div>
  <div class="staff-picks-scroll" id="watchlistScroll"></div>
</div>

<div class="staff-picks" id="staffPicks" style="display:none">
  <div class="staff-picks-header">
    <span class="staff-picks-title">Jeremiah's Picks</span>
    <span class="staff-picks-subtitle">Films I Rated Five Stars</span>
    <button class="staff-picks-toggle" id="staffPicksToggle" onclick="toggleStaffPicks()">Hide</button>
  </div>
  <div class="staff-picks-scroll" id="staffPicksScroll"></div>

// Decade list — uses canonicalYear so TMDB corrections (and "(YYYY)" in titles) take effect
function rebuildDecadeRow() {
  const decades = {};
  ALL_MOVIES.forEach(m => {
    const y = canonicalYear(m);
    if (y) {
      const d = Math.floor(parseInt(y) / 10) * 10;
      if (!isNaN(d)) decades[d] = (decades[d] || 0) + 1;
    }
  });
  const decadeRow = document.getElementById('decadeRow');
  // Wipe everything after the "Any Decade" button
  while (decadeRow.children.length > 1) decadeRow.removeChild(decadeRow.lastChild);
  Object.keys(decades).sort().forEach(d => {
    const btn = document.createElement('button');
    btn.className = 'decade-btn';
    btn.textContent = d + 's';
    btn.onclick = () => setDecade(d);
    btn.id = 'dec-' + d;
    decadeRow.appendChild(btn);
  });
}

// Year + genre overrides cached from TMDB across sessions
const TMDB_CACHE_KEY = 'jarvis_randomizer_tmdb_cache_v1';
let tmdbCache = {};
try { tmdbCache = JSON.parse(localStorage.getItem(TMDB_CACHE_KEY) || '{}'); } catch (e) { tmdbCache = {}; }

function cacheKey(m) { return (m.title + '|' + (m.year || '')).toLowerCase(); }

// Source of truth for a film's actual release year
// Precedence: explicit "(YYYY)" in title > TMDB cache > Apple's stored year
function canonicalYear(m) {
  const titleMatch = m.title && m.title.match(/\((\d{4})\)/);
  if (titleMatch) return titleMatch[1];
  const cached = tmdbCache[cacheKey(m)];
  if (cached && cached.year) return String(cached.year);
  return m.year || '';
}

function canonicalGenres(m) {
  const cached = tmdbCache[cacheKey(m)];
  return cached && cached.genres ? cached.genres : [];
}

let currentDirector = 'all';
let currentGenre = 'all';
let currentSearch = '';
let currentActor = '';
let currentActorMovieIds = null; // Set of TMDB ids the active actor appeared in (null = no actor filter)
let currentSort = 'az';

function getPool() {
  let pool = ALL_MOVIES;
  if (currentDecade !== 'all') {
    pool = pool.filter(m => {
      const y = canonicalYear(m);
      return y && Math.floor(parseInt(y)/10)*10 === parseInt(currentDecade);
    });
  }
  if (currentDirector !== 'all') {
    const q = currentDirector.toLowerCase();
    pool = pool.filter(m => (m.director || '').toLowerCase().includes(q));
  }
  if (currentGenre !== 'all') {
    pool = pool.filter(m => canonicalGenres(m).includes(currentGenre));
  }
  if (currentSearch) {
    const s = currentSearch.toLowerCase();
    pool = pool.filter(m => (m.title || '').toLowerCase().includes(s));
  }
  if (currentActorMovieIds && currentActorMovieIds.size > 0) {
    pool = pool.filter(m => {
      const c = tmdbCache[cacheKey(m)];
      return c && c.tmdbId && currentActorMovieIds.has(c.tmdbId);
    });
  }
  return pool;
}

function setSearch(v) {
  currentSearch = (v || '').trim();
  updatePool();
}

function setSort(v) {
  currentSort = v;
  renderShelf();
}

// Sort a pool of movies by the active sort mode
function sortPool(pool) {
  const stripArticle = t => (t || '').replace(/^(the|a|an)\s+/i, '');
  const arr = [...pool];
  switch (currentSort) {
    case 'random':
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    case 'year-desc':
      return arr.sort((a, b) => (parseInt(canonicalYear(b) || '0') - parseInt(canonicalYear(a) || '0')));
    case 'year-asc':
      return arr.sort((a, b) => (parseInt(canonicalYear(a) || '0') - parseInt(canonicalYear(b) || '0')));
    case 'rating-desc':
      return arr.sort((a, b) => {
        const ar = (tmdbCache[cacheKey(a)] || {}).voteAverage || 0;
        const br = (tmdbCache[cacheKey(b)] || {}).voteAverage || 0;
        return br - ar;
      });
    case 'director':
      return arr.sort((a, b) => (a.director || 'zzz').localeCompare(b.director || 'zzz'));
    case 'az':
    default:
      return arr.sort((a, b) => stripArticle(a.title).localeCompare(stripArticle(b.title)));
  }
}

// Debounced actor lookup — fetches /search/person, takes top hit, gets their movie_credits
let actorDebounce = null;
function setActor(v) {
  currentActor = (v || '').trim();
  if (actorDebounce) clearTimeout(actorDebounce);

  if (!currentActor) {
    currentActorMovieIds = null;
    document.getElementById('actorStatus').textContent = '';
    updatePool();
    return;
  }

  document.getElementById('actorStatus').textContent = 'Looking up ' + currentActor + '…';
  actorDebounce = setTimeout(async () => {
    try {
      const searchUrl = tmdbUrl('/search/person', { query: currentActor, language: 'en-US' });
      const sRes = await fetch(searchUrl);
      const sData = await sRes.json();
      const person = (sData.results || [])[0];
      if (!person) {
        currentActorMovieIds = new Set();
        document.getElementById('actorStatus').textContent = 'No actor matching "' + currentActor + '"';
        updatePool();
        return;
      }
      const creditsUrl = tmdbUrl(`/person/${person.id}/movie_credits`, { language: 'en-US' });
      const cRes = await fetch(creditsUrl);
      const cData = await cRes.json();
      const ids = new Set();
      for (const credit of (cData.cast || [])) ids.add(credit.id);
      currentActorMovieIds = ids;
      document.getElementById('actorStatus').textContent = `${person.name} · ${ids.size} films in their career`;
      updatePool();
    } catch (e) {
      document.getElementById('actorStatus').textContent = 'Lookup failed';
    }
  }, 400);
}

function updatePool() {

function toggleShelf() {

  const opening = !shelf.classList.contains('open');
  shelf.classList.toggle('open');
  btn.classList.toggle('active', opening);

  if (opening) renderShelf();

function renderShelf() {
  const shelf = document.getElementById('shelf');
  const pool = getPool();
  // Sort alphabetically — leading articles stripped for natural order
  const stripArticle = t => (t || '').replace(/^(the|a|an)\s+/i, '');
  const sorted = sortPool(pool);

  shelf.innerHTML = '';
  if (sorted.length === 0) {
    shelf.innerHTML = `
      <div class="shelf-empty">
        <div class="big">Nothing on the shelf, sir.</div>
        <div class="small">Try adjusting your filters</div>
      </div>
    `;
    shelfSorted = [];
    shelfRenderIndex = 0;
    return;
  }
  // Progressive render — iOS Safari was hitting memory pressure with 967 items rendered at once
  shelfSorted = sorted;
  shelfRenderIndex = 0;
  appendShelfBatch();
}

// Module-level state for the progressive shelf
let shelfSorted = [];
let shelfRenderIndex = 0;
const SHELF_BATCH_SIZE = 60;

function appendShelfBatch() {
  const shelf = document.getElementById('shelf');
  if (!shelf || shelfRenderIndex >= shelfSorted.length) return;

  // Remove any old sentinel before adding the new batch
  const oldSentinel = shelf.querySelector('.shelf-sentinel');
  if (oldSentinel) oldSentinel.remove();

  const frag = document.createDocumentFragment();
  const end = Math.min(shelfRenderIndex + SHELF_BATCH_SIZE, shelfSorted.length);
  for (let i = shelfRenderIndex; i < end; i++) frag.appendChild(buildShelfItem(shelfSorted[i]));
  shelf.appendChild(frag);
  shelfRenderIndex = end;

  // Sentinel to trigger the next batch
  if (shelfRenderIndex < shelfSorted.length) {
    const sentinel = document.createElement('div');
    sentinel.className = 'shelf-sentinel';
    sentinel.style.cssText = 'grid-column: 1 / -1; height: 1px;';
    shelf.appendChild(sentinel);
    shelfBatchObserver.observe(sentinel);
  }
}

const shelfBatchObserver = new IntersectionObserver(entries => {
  for (const entry of entries) {
    if (entry.isIntersecting) {
      shelfBatchObserver.unobserve(entry.target);
      appendShelfBatch();
    }
  }
}, { rootMargin: '600px' });

// ===== WATCHLIST / CHECKOUT =====
// Persistent list of films Jeremiah "checked out" — stored in localStorage as title+year keys
const WATCHLIST_KEY = 'jarvis_randomizer_watchlist_v1';
let watchlist = [];
try { watchlist = JSON.parse(localStorage.getItem(WATCHLIST_KEY) || '[]'); } catch (e) { watchlist = []; }

function watchlistKey(m) { return (m.title + '|' + (canonicalYear(m) || '')).toLowerCase(); }
function isCheckedOut(m) { return watchlist.some(w => w.key === watchlistKey(m)); }

function checkOut(m) {
  if (isCheckedOut(m)) return;
  watchlist.push({
    key: watchlistKey(m),
    title: m.title,
    year: canonicalYear(m),
    director: m.director || null,
    checkedOutAt: new Date().toISOString(),
  });
  localStorage.setItem(WATCHLIST_KEY, JSON.stringify(watchlist));
  renderWatchlist();
  // Repaint both case faces so the button label updates regardless of orientation
  const openCase = document.getElementById('caseModal').classList.contains('open');
  if (openCase) { paintCaseFront(m); paintCaseBack(m); }
}

function checkIn(m) {
  watchlist = watchlist.filter(w => w.key !== watchlistKey(m));
  localStorage.setItem(WATCHLIST_KEY, JSON.stringify(watchlist));
  renderWatchlist();
  const openCase = document.getElementById('caseModal').classList.contains('open');
  if (openCase) { paintCaseFront(m); paintCaseBack(m); }
}

function renderWatchlist() {
  const rail = document.getElementById('watchlistRail');
  const scroll = document.getElementById('watchlistScroll');
  if (watchlist.length === 0) {
    rail.style.display = 'none';
    return;
  }
  rail.style.display = '';
  scroll.innerHTML = '';
  // Resolve each watchlist entry to the actual ALL_MOVIES record (still in the library)
  const items = watchlist
    .map(w => ALL_MOVIES.find(m => watchlistKey(m) === w.key))
    .filter(Boolean);
  if (items.length === 0) {
    rail.style.display = 'none';
    return;
  }
  for (const m of items) scroll.appendChild(buildShelfItem(m, { checkedOut: true }));
}

// Build a Letterboxd diary lookup by lowercased title+year — used for matching to ALL_MOVIES
const DIARY_BY_KEY = (() => {
  const map = {};
  for (const d of (LETTERBOXD_DIARY || [])) {
    const k = (d.title + '|' + (d.year || '')).toLowerCase();
    // Prefer the most recent entry per film
    if (!map[k] || (d.watchedDate || '') > (map[k].watchedDate || '')) map[k] = d;
  }
  return map;
})();

function diaryEntryFor(m) {
  // Try exact title+year match against the diary, then a looser title-only fallback
  const cleanTitle = (m.title || '').replace(/\s*\([^)]*\)\s*$/g, '').trim();
  const year = canonicalYear(m);
  const k = (cleanTitle + '|' + (year || '')).toLowerCase();
  if (DIARY_BY_KEY[k]) return DIARY_BY_KEY[k];
  // Fallback: same title, any year
  for (const key of Object.keys(DIARY_BY_KEY)) {
    if (key.startsWith(cleanTitle.toLowerCase() + '|')) return DIARY_BY_KEY[key];
  }
  return null;
}

const STAFF_PICKS_COLLAPSED_KEY = 'jarvis_randomizer_staff_picks_collapsed';
function toggleStaffPicks() {
  const rail = document.getElementById('staffPicks');
  const isOpening = rail.classList.contains('collapsed');
  rail.classList.toggle('collapsed');
  document.getElementById('staffPicksToggle').textContent = isOpening ? 'Hide' : 'Show';
  localStorage.setItem(STAFF_PICKS_COLLAPSED_KEY, isOpening ? '0' : '1');
}

// Render the Jeremiah's Picks rail — films from the Letterboxd diary rated 4.5+ that are also in the library
function renderStaffPicks() {
  const picks = (LETTERBOXD_DIARY || []).filter(d => d.rating && d.rating >= 5.0);
  if (picks.length === 0) {
    document.getElementById('staffPicks').style.display = 'none';
    return;
  }

  // Match each pick to an ALL_MOVIES entry (by title+year, case-insensitive)
  const matched = [];
  const seen = new Set();
  for (const d of picks) {
    const k = (d.title + '|' + (d.year || '')).toLowerCase();
    if (seen.has(k)) continue;
    const m = ALL_MOVIES.find(mm => {
      const cleanT = (mm.title || '').replace(/\s*\([^)]*\)\s*$/g, '').trim();
      return cleanT.toLowerCase() === d.title.toLowerCase() && parseInt(canonicalYear(mm) || '0') === d.year;
    });
    if (m) {
      matched.push(m);
      seen.add(k);
    }
  }

  if (matched.length === 0) {
    document.getElementById('staffPicks').style.display = 'none';
    return;
  }

  const scroll = document.getElementById('staffPicksScroll');
  scroll.innerHTML = '';
  for (const m of matched) {
    scroll.appendChild(buildShelfItem(m, { showRating: true }));
  }
  const rail = document.getElementById('staffPicks');
  rail.style.display = '';
  // Restore persisted collapsed state
  if (localStorage.getItem(STAFF_PICKS_COLLAPSED_KEY) === '1') {
    rail.classList.add('collapsed');
    document.getElementById('staffPicksToggle').textContent = 'Show';
  }
}

// Factored builder so the regular shelf and the staff picks rail share the same VHS case styling
function buildShelfItem(m, opts = {}) {
  const cached = tmdbCache[cacheKey(m)];
  const posterUrl = cached && cached.posterPath ? 'https://image.tmdb.org/t/p/w342' + cached.posterPath : null;

  const item = document.createElement('div');
  item.className = 'shelf-item';
  item.title = m.title + (canonicalYear(m) ? ' (' + canonicalYear(m) + ')' : '') + (m.director ? ' · ' + m.director : '');
  item.dataset.title = (m.title || '').replace(/\s*\([^)]*\)\s*$/g, '');
  item.dataset.year = canonicalYear(m);
  item.dataset.cacheKey = cacheKey(m);
  item.style.setProperty('--spine-color', spineColorFor(m.title));

  const yearLabel = canonicalYear(m) ? ' (' + canonicalYear(m) + ')' : '';
  const safeTitle = m.title.replace(/"/g, '&quot;');
  const rating = (cached && cached.voteAverage) ? cached.voteAverage : 0;
  const year = parseInt(canonicalYear(m) || '0', 10);
  const diary = diaryEntryFor(m);
  const stickers =
    (rating >= 7.5 && !opts.showRating ? '<span class="staff-pick">Staff Pick</span>' : '') +
    (rating >= 7.0 && year > 0 && year < 1990 && !opts.showRating ? '<span class="cult-classic">Cult Classic</span>' : '');

  const cover = posterUrl
    ? `<div class="cover"><img src="${posterUrl}" loading="lazy" alt="${safeTitle}" /></div>`
    : `<div class="cover"><div class="fallback"><div class="t">${item.dataset.title}</div><div>${canonicalYear(m) || ''}</div></div></div>`;

  const userBadge = (opts.showRating && diary && diary.rating)
    ? `<span class="user-rating">${'★'.repeat(Math.floor(diary.rating))}${diary.liked ? ' ♥' : ''}</span>`
    : '';
  const heart = (!opts.showRating && diary && diary.liked) ? '<span class="liked-heart">♥</span>' : '';
  // Don't double-stamp in the Checked Out rail itself
  const checkedStamp = (!opts.checkedOut && isCheckedOut(m)) ? '<span class="checked-out-stamp">Checked Out</span>' : '';

  item.innerHTML = `
    ${stickers}
    ${userBadge}
    ${heart}
    ${checkedStamp}
    ${cover}
    <div class="label">${item.dataset.title}${yearLabel}</div>
    <div class="gloss"></div>
  `;

  if (!posterUrl) lazyPosterObserver.observe(item);
  // Mouse-tilt only on devices with a hover-capable pointer (skip on touch — saves overhead)
  if (HAS_HOVER) {
    item.addEventListener('mousemove', onShelfItemMove);
    item.addEventListener('mouseleave', onShelfItemLeave);
  }
  item.onclick = () => pickOne(m);
  return item;
}

// Single capability check used to skip pointer-only behavior on touch devices
const HAS_HOVER = window.matchMedia('(hover: hover) and (pointer: fine)').matches;

// Deterministic dark color from a title — every movie gets a unique spine tone
function spineColorFor(seed) {
  let h = 0;
  for (let i = 0; i < (seed || '').length; i++) h = (h * 31 + seed.charCodeAt(i)) | 0;
  const hue = Math.abs(h) % 360;
  return `hsl(${hue}, 38%, 18%)`;
}

// 3D tilt that tracks the cursor — looks like a real plastic case catching the light
function onShelfItemMove(e) {
  const r = this.getBoundingClientRect();
  const px = (e.clientX - r.left) / r.width;
  const py = (e.clientY - r.top) / r.height;
  const tiltX = (0.5 - py) * 10;
  const tiltY = (px - 0.5) * 12;
  this.style.transform = `translateY(-4px) scale(1.03) rotateX(${tiltX}deg) rotateY(${tiltY}deg)`;
  this.style.setProperty('--mx', (px * 100) + '%');
  this.style.setProperty('--my', (py * 100) + '%');
}
function onShelfItemLeave() {
  this.style.transform = '';
  this.style.removeProperty('--mx');
  this.style.removeProperty('--my');
}

// Lazily fetch posters for shelf items that aren't in the TMDB cache yet
const lazyPosterObserver = new IntersectionObserver(async entries => {
  for (const entry of entries) {
    if (!entry.isIntersecting) continue;
    const item = entry.target;
    lazyPosterObserver.unobserve(item);
    const url = await fetchPoster(item.dataset.title, item.dataset.year);
    if (url) {
      // Save to cache so next render is instant
      const key = item.dataset.cacheKey;
      tmdbCache[key] = { ...(tmdbCache[key] || {}), posterPath: url.replace('https://image.tmdb.org/t/p/w342', '') };
      localStorage.setItem(TMDB_CACHE_KEY, JSON.stringify(tmdbCache));
      // Replace only the .cover inner content so the spine + label persist
      const cover = item.querySelector('.cover');
      if (cover) cover.innerHTML = `<img src="${url}" alt="${(item.dataset.title || '').replace(/"/g, '&quot;')}" />`;
    }
  }
}, { rootMargin: '300px' });

// Genre color map ported from cinema-chat — drives the colored stripe at the top of the back-of-box
const GENRE_COLORS = {
  Action: '#e53e3e', Adventure: '#dd6b20', Animation: '#38b2ac', Comedy: '#ecc94b',
  Crime: '#9f7aea', Documentary: '#4299e1', Drama: '#3182ce', Family: '#48bb78',
  Fantasy: '#805ad5', History: '#b7791f', Horror: '#c53030', Music: '#d53f8c',
  Mystery: '#667eea', Romance: '#ed64a6', 'Science Fiction': '#00b5d8',
  'TV Movie': '#a0aec0', Thriller: '#e53e3e', War: '#718096', Western: '#c05621',
};

// Deterministic pseudo-random barcode widths from a seed string (also from cinema-chat)
function barcodeWidths(seed) {
  let h = 0;
  for (let i = 0; i < seed.length; i++) h = (h * 31 + seed.charCodeAt(i)) | 0;
  const widths = [];
  for (let i = 0; i < 36; i++) {
    h = (h * 1103515245 + 12345) | 0;
    widths.push(((h >>> 16) & 3) + 1);
  }
  return widths;
}

function escapeHtml(s) {
  return (s || '').replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
}

// Ensure the cache for this film has overview + voteAverage (older entries pre-date that schema).
// Lazy-fetches from TMDB if missing, persists, and returns the updated cache row.
async function ensureDetails(m) {
  const key = cacheKey(m);
  let cached = tmdbCache[key];
  if (cached && cached.tmdbId && (cached.overview !== undefined)) return cached;

  // Need to (re)fetch — search by clean title + canonical year
  try {
    const cleanTitle = cleanTitleForSearch(m.title);
    const url = tmdbUrl('/search/movie', { query: cleanTitle, year: canonicalYear(m), language: 'en-US' });
    const res = await fetch(url);
    if (res.ok) {
      const data = await res.json();
      const hit = data.results && data.results[0];
      if (hit) {
        const year = hit.release_date ? hit.release_date.slice(0, 4) : null;
        const genres = (hit.genre_ids || []).map(id => TMDB_GENRES[id]).filter(Boolean);
        cached = {
          tmdbId: hit.id, year, genres,
          posterPath: hit.poster_path || null,
          overview: hit.overview || '',
          voteAverage: hit.vote_average || 0,
        };
        tmdbCache[key] = cached;
        localStorage.setItem(TMDB_CACHE_KEY, JSON.stringify(tmdbCache));
      }
    }
  } catch (e) {}
  return tmdbCache[key] || {};
}

// Fetch additional images (backdrops) for the filmstrip on the back of the case.
// Cached as `backdrops: [file_path, ...]` (top 3 by vote_average) so repeats are instant.
async function ensureBackdrops(m) {
  const key = cacheKey(m);
  const cached = tmdbCache[key];
  if (!cached || !cached.tmdbId) return [];
  if (Array.isArray(cached.backdrops)) return cached.backdrops;

  try {
    const url = tmdbUrl(`/movie/${cached.tmdbId}/images`, { include_image_language: 'en,null' });
    const res = await fetch(url);
    if (res.ok) {
      const data = await res.json();
      const backdrops = (data.backdrops || [])
        .filter(b => b.file_path)
        .sort((a, b) => (b.vote_average || 0) - (a.vote_average || 0))
        .slice(0, 2)
        .map(b => b.file_path);
      tmdbCache[key].backdrops = backdrops;
      localStorage.setItem(TMDB_CACHE_KEY, JSON.stringify(tmdbCache));
      return backdrops;
    }
  } catch (e) {}
  tmdbCache[key].backdrops = [];
  return [];
}

// Fetch tagline, top cast, MPAA rating, runtime from TMDB. One combined call via append_to_response.
// Cached as `tagline`, `cast`, `mpaa`, `runtime` so repeats are instant.
async function ensureFullDetails(m) {
  const key = cacheKey(m);
  const cached = tmdbCache[key];
  if (!cached || !cached.tmdbId) return cached;
  if (cached.tagline !== undefined && cached.cast !== undefined) return cached; // already fetched

  try {
    const url = tmdbUrl(`/movie/${cached.tmdbId}`, { append_to_response: 'credits,release_dates', language: 'en-US' });
    const res = await fetch(url);
    if (res.ok) {
      const data = await res.json();
      // Top 3 cast members
      const cast = ((data.credits && data.credits.cast) || [])
        .slice(0, 3)
        .map(c => c.name);
      // US MPAA certification (G, PG, PG-13, R, NC-17)
      let mpaa = '';
      const usEntry = ((data.release_dates && data.release_dates.results) || [])
        .find(r => r.iso_3166_1 === 'US');
      if (usEntry) {
        const cert = (usEntry.release_dates || []).find(rd => rd.certification);
        if (cert) mpaa = cert.certification;
      }
      cached.tagline = data.tagline || '';
      cached.cast = cast;
      cached.mpaa = mpaa;
      cached.runtime = data.runtime || null;
      localStorage.setItem(TMDB_CACHE_KEY, JSON.stringify(tmdbCache));
    }
  } catch (e) {}
  return cached;
}

// Open the case modal — populates both faces and starts showing the front
async function openCaseModal(m) {
  // Reset to front side
  document.getElementById('caseInner').classList.remove('flipped');
  // Render front + back synchronously from whatever cache we have, then enrich
  paintCaseFront(m);
  paintCaseBack(m);
  document.getElementById('caseModal').classList.add('open');
  // Lock body scroll so the page beneath doesn't move while the modal is open
  document.body.dataset.scrollY = String(window.scrollY);
  document.body.classList.add('modal-open');
  document.body.style.top = `-${window.scrollY}px`;

  // Lazy-fill missing TMDB data (synopsis, rating, etc.) then repaint
  const cached = await ensureDetails(m);
  if (cached && (cached.overview || cached.posterPath)) {
    paintCaseFront(m);
    paintCaseBack(m);
  }
  // Then enrich with backdrop stills for the filmstrip
  const backdrops = await ensureBackdrops(m);
  if (backdrops && backdrops.length > 0) paintCaseBack(m);
}

function flipCase() {
  document.getElementById('caseInner').classList.toggle('flipped');
}

function closeCaseModal() {
  document.getElementById('caseModal').classList.remove('open');
  document.getElementById('caseInner').classList.remove('flipped');
  // Unlock body scroll and restore prior position
  const y = parseInt(document.body.dataset.scrollY || '0', 10);
  document.body.classList.remove('modal-open');
  document.body.style.top = '';
  window.scrollTo(0, y);
}

// Close on Escape key
document.addEventListener('keydown', e => {

function paintCaseFront(m) {

  const year = canonicalYear(m);
  const safeTitle = escapeHtml(m.title.replace(/\s*\([^)]*\)\s*$/g, ''));
  const genreList = genres.slice(0, 2).join(' / ');
  const metaBits = [year, m.runtime, genreList].filter(Boolean).join(' • ');
  const posterUrl = cached.posterPath
    ? 'https://image.tmdb.org/t/p/w500' + cached.posterPath
    : null;

  // Real closure handler — avoids the broken HTML-attribute string templating
  const fbtn = front.querySelector('[data-action="checkout"]');
  if (fbtn) fbtn.onclick = () => {
    if (isCheckedOut(m)) checkIn(m); else checkOut(m);

// Paint the BACK face of the case — cream paper insert with synopsis, credits, barcode
function paintCaseBack(m) {
  const cached = tmdbCache[cacheKey(m)] || {};
  const genres = canonicalGenres(m);
  const genreColor = genres.length && GENRE_COLORS[genres[0]] ? GENRE_COLORS[genres[0]] : '#f5c518';
  const year = canonicalYear(m);
  const safeTitle = escapeHtml(m.title.replace(/\s*\([^)]*\)\s*$/g, ''));
  const synopsis = cached.overview || 'No synopsis on file.';
  const genreList = genres.slice(0, 2).join(' / ');
  const metaBits = [year, m.runtime, genreList].filter(Boolean).join(' • ');
  const rating = cached.voteAverage ? (cached.voteAverage / 2).toFixed(1) : null;
  const posterUrl = cached.posterPath
    ? 'https://image.tmdb.org/t/p/w342' + cached.posterPath
    : null;
  const widths = barcodeWidths(m.title + (year || ''));
  const barcodeHtml = widths.map(w => `<span style="width:${w}px"></span>`).join('');
  const backdrops = (cached.backdrops && cached.backdrops.length)
    ? cached.backdrops.slice(0, 2)
    : [];
  const filmstrip = backdrops.length
    ? `<div class="vhs-filmstrip">${backdrops.map(p => `<div class="vhs-filmstrip-frame"><img src="https://image.tmdb.org/t/p/w300${p}" alt="" /></div>`).join('')}</div>`
    : '';

  // "More from this director" — find up to 6 other films in the library with the same director
  const directorRailItems = m.director
    ? ALL_MOVIES.filter(other => other !== m && other.director === m.director).slice(0, 6)
    : [];
  const directorRail = directorRailItems.length
    ? `<div class="vhs-director-rail">
        <div class="vhs-director-rail-label">More from ${escapeHtml(m.director)}</div>
        <div class="vhs-director-rail-scroll">
          ${directorRailItems.map((o, idx) => {
            const oCached = tmdbCache[cacheKey(o)] || {};
            const oPoster = oCached.posterPath ? 'https://image.tmdb.org/t/p/w185' + oCached.posterPath : null;
            const oTitle = (o.title || '').replace(/\s*\([^)]*\)\s*$/g, '');
            const oYear = canonicalYear(o);
            return `<div class="vhs-director-rail-item" data-director-idx="${idx}" title="${escapeHtml(o.title)} (${oYear})">
              ${oPoster ? `<img src="${oPoster}" alt="${escapeHtml(oTitle)}" />` : `<div class="placeholder">${escapeHtml(oTitle)}</div>`}
              <div class="t">${escapeHtml(oTitle)}</div>
            </div>`;
          }).join('')}
        </div>
      </div>`
    : '';

  const checkedOut = isCheckedOut(m);
  const checkoutBtnLabel = checkedOut ? 'Return Tape' : 'Check Out';

  const back = document.getElementById('caseBack');
  back.style.setProperty('--genre-color', genreColor);
  back.innerHTML = `
    <div class="vhs-back-paper" style="--genre-color: ${genreColor}">
      <div class="vhs-back-main">
        <h2 class="film-title">${safeTitle}</h2>
        <p class="film-meta">${escapeHtml(metaBits)}</p>
        ${rating ? `<span class="vhs-rating-badge">&#9733; ${rating}</span>` : ''}
        <div>
          <span class="vhs-kicker">Synopsis</span>
          <p class="vhs-synopsis">${escapeHtml(synopsis)}</p>
        </div>
        <div class="vhs-credits">
          ${m.director ? `<p><span class="label">Director:</span> ${escapeHtml(m.director)}</p>` : ''}
          ${genres.length ? `<p><span class="label">Genre:</span> ${escapeHtml(genres.join(', '))}</p>` : ''}
        </div>
      </div>
      ${filmstrip}
      ${directorRail}
      <div class="vhs-back-footer">
        <div class="vhs-barcode" aria-hidden="true">${barcodeHtml}</div>
        <span class="vhs-copyright">${year ? '©' + year : ''}</span>
      </div>
    </div>
    <div class="vhs-case-actions">
      <button class="vhs-turn-btn" onclick="flipCase()">Turn Over</button>
      <button class="vhs-turn-btn" data-action="checkout">${checkoutBtnLabel}</button>
      <button class="vhs-putback-btn" onclick="closeCaseModal()">Put Back</button>
    </div>
  `;

  // Attach checkout handler with a real closure — avoids quote-escape bugs in onclick string templates
  const btn = back.querySelector('[data-action="checkout"]');
  if (btn) btn.onclick = () => {
    if (isCheckedOut(m)) checkIn(m); else checkOut(m);
  };
  // Wire the director rail clicks
  back.querySelectorAll('[data-director-idx]').forEach(el => {
    const idx = parseInt(el.dataset.directorIdx, 10);
    const other = directorRailItems[idx];
    if (other) el.onclick = () => openCaseModal(other);
  });
}

// TMDB calls always route through /api/tmdb/* on jeremiahdaws.com.
// The proxy injects the API key from a Vercel env var so it never reaches the browser.
function tmdbUrl(path, params = {}) {
  const u = new URL(location.origin + '/api/tmdb/3' + path);
  for (const [k, v] of Object.entries(params)) {
    if (v !== undefined && v !== null && v !== '') u.searchParams.set(k, String(v));
  }
  return u.toString();
}
// Strip any trailing parenthetical suffixes from a title for TMDB search:
//   "(1974)", "(Special Edition)", "(25th Anniversary Edition)", "(Director's Cut)", etc.
// Loops so multiple suffixes get peeled off — "Foo (1977) (4K)" → "Foo".
function cleanTitleForSearch(title) {
  let t = title || '';
  while (/\s*\([^)]*\)\s*$/.test(t)) t = t.replace(/\s*\([^)]*\)\s*$/, '');
  return t;
}
async function fetchPoster(title, year) {
  const cleanTitle = cleanTitleForSearch(title);
  try {
    const res = await fetch(tmdbUrl('/search/movie', { query: cleanTitle, year, language: 'en-US' }));
    if (!res.ok) return null;
    const data = await res.json();
    if (data.results && data.results.length > 0 && data.results[0].poster_path) {
      return 'https://image.tmdb.org/t/p/w342' + data.results[0].poster_path;
    }
  } catch(e) {}
  return null;
}

// Build director typeahead list — every unique director, sorted
function buildDirectorList() {
  const seen = new Set();
  ALL_MOVIES.forEach(m => {
    if (m.director) seen.add(m.director);
  });
  const dl = document.getElementById('directorList');
  dl.innerHTML = '';
  Array.from(seen).sort((a, b) => a.localeCompare(b)).forEach(d => {
    const opt = document.createElement('option');
    opt.value = d;
    dl.appendChild(opt);
  });
}

// Build genre dropdown from whatever's in the TMDB cache right now
function buildGenreSelect() {
  const seen = new Set();
  ALL_MOVIES.forEach(m => canonicalGenres(m).forEach(g => seen.add(g)));
  const sel = document.getElementById('genreSelect');
  const previous = sel.value;
  sel.innerHTML = '<option value="all">Any genre</option>';
  Array.from(seen).sort().forEach(g => {
    const opt = document.createElement('option');
    opt.value = g;
    opt.textContent = g;
    sel.appendChild(opt);
  });
  if ([...sel.options].some(o => o.value === previous)) sel.value = previous;
}

// Background TMDB enrichment — fetches release year + genres for every film, caches in localStorage
async function enrichFromTMDB() {
  const loading = document.getElementById('genreLoading');
  // Retry films that previously failed (no tmdbId) — search logic may have improved
  const todo = ALL_MOVIES.filter(m => {
    const c = tmdbCache[cacheKey(m)];
    return !c || !c.tmdbId;
  });
  if (todo.length === 0) {
    loading.textContent = '';
    return;
  }

  let done = 0;
  let saveCounter = 0;
  loading.textContent = `Enriching genres + dates… 0/${todo.length}`;

  for (const m of todo) {
    try {
      const url = tmdbUrl('/search/movie', { query: cleanTitleForSearch(m.title), year: canonicalYear(m), language: 'en-US' });
      const res = await fetch(url);
      if (res.ok) {
        const data = await res.json();
        const hit = data.results && data.results[0];
        if (hit) {
          const year = hit.release_date ? hit.release_date.slice(0, 4) : null;
          const genres = (hit.genre_ids || []).map(id => TMDB_GENRES[id]).filter(Boolean);
          const posterPath = hit.poster_path || null;
          tmdbCache[cacheKey(m)] = {
            tmdbId: hit.id,
            year,
            genres,
            posterPath,
            overview: hit.overview || '',
            voteAverage: hit.vote_average || 0,
          };
        } else {
          tmdbCache[cacheKey(m)] = { tmdbId: null, year: null, genres: [], posterPath: null, overview: '', voteAverage: 0 };
        }
      }
    } catch (e) {}

    done++;
    saveCounter++;
    loading.textContent = `Enriching genres + dates… ${done}/${todo.length}`;

    // Batch save + UI refresh every 25 movies
    if (saveCounter >= 25) {
      saveCounter = 0;
      localStorage.setItem(TMDB_CACHE_KEY, JSON.stringify(tmdbCache));
      buildGenreSelect();
      rebuildDecadeRow();
      if (document.getElementById('shelf').classList.contains('open')) renderShelf();
    }

    // Polite throttle — TMDB allows 40/sec, we use ~5/sec
    await new Promise(r => setTimeout(r, 200));
  }

  localStorage.setItem(TMDB_CACHE_KEY, JSON.stringify(tmdbCache));
  buildGenreSelect();
  rebuildDecadeRow();
  if (document.getElementById('shelf').classList.contains('open')) renderShelf();
  loading.textContent = '';
}

if (window.matchMedia('(max-width: 700px)').matches) {
  const picks = document.getElementById('staffPicks');
  if (picks) picks.classList.add('mobile-collapsed');
}

// Back-to-top button visibility — show after scrolling 400px
const backToTopBtn = document.getElementById('backToTop');
if (backToTopBtn) {
  window.addEventListener('scroll', () => {
    backToTopBtn.classList.toggle('visible', window.scrollY > 400);
  }, { passive: true });
}
</script>

</body>
